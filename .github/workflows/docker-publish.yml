name: Build and Push to DockerHub

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: false
        default: 'all'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/caring-iggy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'backend/pom.xml'

      - name: Extract metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" == "${GITHUB_REF}" ]; then
            VERSION=latest
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Push animal-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: animal-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-animal-service:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-animal-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: user-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-user-service:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push matching-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: matching-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-matching-service:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-matching-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push reporting-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: reporting-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-reporting-service:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-reporting-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push adopter-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: adopter-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-adopter-service:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-adopter-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.meta.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed to DockerHub:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-animal-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-user-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-matching-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-reporting-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-adopter-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE_PREFIX }}-frontend\`" >> $GITHUB_STEP_SUMMARY
